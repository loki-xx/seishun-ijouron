<script src="main.js"></script>
<script>
  /* Flowing background text */
  (function () {
    const bg = document.getElementById('heroBg');
    const words = [
      'また眠れなかった', '誰かに届いてますか',
      '消えたいじゃなくて、休みたい', '深夜2時のほうが正直になれる',
      '青春って言葉が怖い', '音楽だけが本当のことを言う',
      '正常じゃなくてよかった', 'AYN', 'anomalous youth network',
      '誰でもない誰か', 'おやすみ', '友達のふりがうまくなりすぎた',
    ];
    const lines = 8;
    for (let i = 0; i < lines; i++) {
      const track = document.createElement('div');
      track.className = 'hero-bg-track';
      const top = 5 + i * 12;
      const dur = 28 + i * 4;
      const delay = -(i * 6);
      track.style.cssText = `top:${top}%;animation-duration:${dur}s;animation-delay:${delay}s`;
      // Duplicate for seamless loop
      let text = '';
      for (let j = 0; j < 6; j++) {
        text += words.map(w => w + '　　').join('');
      }
      // Duplicate for seamless scroll
      track.textContent = text + text;
      bg.appendChild(track);
    }
  })();
</script>
